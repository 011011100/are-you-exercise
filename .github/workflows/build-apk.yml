name: Build APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - "dist/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/are-you-exercise-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: are-you-exercise-debug-apk
          path: dist/are-you-exercise-debug.apk

      - name: Commit APK to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/are-you-exercise-debug.apk
          git commit -m "Build debug APK [skip ci]" || exit 0
          git push origin HEAD:${{ github.ref_name }}
