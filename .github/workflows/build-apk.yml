name: Build APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - "dist/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Ensure fixed release keystore
        working-directory: android
        run: |
          if [ ! -f app/release.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -storepass areyouexercise \
              -keypass areyouexercise \
              -alias are-you-exercise \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Are You Exercise, OU=Personal, O=011011100, L=Shanghai, ST=Shanghai, C=CN"
          fi

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease -PappVersionCode=${{ github.run_number }} -PappVersionName=1.0.${{ github.run_number }}

      - name: Collect APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/are-you-exercise-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: are-you-exercise-release-apk
          path: dist/are-you-exercise-release.apk

      - name: Commit APK to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch dist/are-you-exercise-debug.apk
          git add -f android/app/release.keystore dist/are-you-exercise-release.apk
          git commit -m "Build release APK [skip ci]" || exit 0
          git push origin HEAD:${{ github.ref_name }}
