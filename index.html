<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#126a5a" />
    <meta name="description" content="离线记录每天是否锻炼，以及训练了手臂、胸、肩膀、腿、腹部、背哪些部位。" />
    <title>练了吗</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite" xmlns="http://www.w3.org/2000/svg">
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01" />
      </symbol>
      <symbol id="icon-save" viewBox="0 0 24 24">
        <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8A2 2 0 0 1 21 8.8V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
        <path d="M7 3v7h10V4M7 21v-8h10v8" />
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6" />
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m20 6-11 11-5-5" />
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12M7 10l5 5 5-5M5 21h14" />
      </symbol>
    </svg>

    <main class="app-shell">
      <section class="top-band" aria-labelledby="app-title">
        <div class="brand-row">
          <img class="brand-mark" src="./app-icon.svg" alt="" />
          <div>
            <h1 id="app-title">练了吗</h1>
            <p id="todayLine" class="muted">今天的训练记录</p>
          </div>
        </div>

        <div class="date-toolbar" aria-label="选择记录日期">
          <button id="prevDayButton" class="icon-button" type="button" aria-label="前一天">
            <svg class="icon"><use href="#icon-chevron-left"></use></svg>
          </button>
          <label class="date-field">
            <svg class="icon"><use href="#icon-calendar"></use></svg>
            <input id="dateInput" type="date" />
          </label>
          <button id="nextDayButton" class="icon-button" type="button" aria-label="后一天">
            <svg class="icon"><use href="#icon-chevron-right"></use></svg>
          </button>
        </div>
      </section>

      <section class="entry-band" aria-labelledby="entry-title">
        <div class="section-heading">
          <div>
            <h2 id="entry-title">当天情况</h2>
            <p class="muted">勾上训练状态，再选择练到的部位。</p>
          </div>
          <label class="switch-row">
            <span>已训练</span>
            <input id="trainedToggle" type="checkbox" />
            <span class="switch-ui" aria-hidden="true"></span>
          </label>
        </div>

        <div id="partGrid" class="part-grid" aria-label="训练部位"></div>

        <label class="note-field">
          <span>备注</span>
          <textarea id="noteInput" rows="3" placeholder="例如：卧推 4 组，深蹲 5 组，状态不错"></textarea>
        </label>

        <div class="action-row">
          <button id="saveButton" class="primary-button" type="button">
            <svg class="icon"><use href="#icon-save"></use></svg>
            保存记录
          </button>
          <button id="clearButton" class="quiet-button" type="button">
            <svg class="icon"><use href="#icon-trash"></use></svg>
            清空当天
          </button>
        </div>
        <p id="saveStatus" class="status-line" role="status" aria-live="polite"></p>
      </section>

      <section class="stats-band" aria-labelledby="stats-title">
        <div class="section-heading compact">
          <div>
            <h2 id="stats-title">训练概览</h2>
            <p class="muted">自动根据本机记录统计。</p>
          </div>
          <button id="exportButton" class="icon-button" type="button" aria-label="导出记录">
            <svg class="icon"><use href="#icon-download"></use></svg>
          </button>
        </div>
        <div class="stats-grid">
          <div class="stat-tile">
            <span>连续</span>
            <strong id="streakCount">0 天</strong>
          </div>
          <div class="stat-tile">
            <span>近 7 天</span>
            <strong id="weekCount">0 天</strong>
          </div>
          <div class="stat-tile">
            <span>本月</span>
            <strong id="monthCount">0 天</strong>
          </div>
          <div class="stat-tile">
            <span>常练</span>
            <strong id="topPart">暂无</strong>
          </div>
        </div>
      </section>

      <section class="calendar-band" aria-labelledby="calendar-title">
        <h2 id="calendar-title">最近 21 天</h2>
        <div id="calendarStrip" class="calendar-strip"></div>
      </section>

      <section class="history-band" aria-labelledby="history-title">
        <h2 id="history-title">最近记录</h2>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
